<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Pointed miter tip -->
  <polygon points="50,4 44,28 56,28" fill="#9b0000" stroke="#c8a020" stroke-width="1.5"/>
  <!-- Miter body -->
  <path d="M36 28 Q34 48 33 58 L67 58 Q66 48 64 28 Z" fill="#9b0000" stroke="#c8a020" stroke-width="1.8"/>
  <!-- Diagonal eye-slash detail -->
  <line x1="38" y1="35" x2="62" y2="52" stroke="#c8a020" stroke-width="1.4" opacity="0.5"/>
  <line x1="62" y1="35" x2="38" y2="52" stroke="#c8a020" stroke-width="1.4" opacity="0.5"/>
  <!-- Collar band -->
  <rect x="30" y="57" width="40" height="7" rx="2" fill="#7a0000" stroke="#c8a020" stroke-width="1.5"/>
  <!-- Ball on tip with gold glow -->
  <circle cx="50" cy="6" r="4" fill="#9b0000" stroke="#c8a020" stroke-width="1.5"/>
  <!-- Base -->
  <rect x="20" y="64" width="60" height="10" rx="3" fill="#7a0000" stroke="#c8a020" stroke-width="1.5"/>
  <rect x="24" y="74" width="52" height="8" rx="2" fill="#5a0000" stroke="#c8a020" stroke-width="1.5"/>
</svg>
