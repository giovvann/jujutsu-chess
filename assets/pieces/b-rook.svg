<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Crenellations (3 merlons) -->
  <rect x="26" y="8" width="14" height="18" rx="1" fill="#9b0000" stroke="#c8a020" stroke-width="1.5"/>
  <rect x="43" y="8" width="14" height="18" rx="1" fill="#9b0000" stroke="#c8a020" stroke-width="1.5"/>
  <rect x="60" y="8" width="14" height="18" rx="1" fill="#9b0000" stroke="#c8a020" stroke-width="1.5"/>
  <!-- Parapet band -->
  <rect x="24" y="24" width="52" height="8" rx="1" fill="#7a0000" stroke="#c8a020" stroke-width="1.5"/>
  <!-- Tower body -->
  <rect x="28" y="32" width="44" height="38" rx="2" fill="#9b0000" stroke="#c8a020" stroke-width="1.8"/>
  <!-- Arrow slit with glow -->
  <rect x="46" y="38" width="8" height="18" rx="2" fill="#3a0000" stroke="#c8a020" stroke-width="0.8" opacity="0.8"/>
  <!-- Cursed marking -->
  <line x1="32" y1="52" x2="68" y2="52" stroke="#c8a020" stroke-width="1" opacity="0.4"/>
  <!-- Base -->
  <rect x="18" y="70" width="64" height="10" rx="3" fill="#7a0000" stroke="#c8a020" stroke-width="1.5"/>
  <rect x="22" y="80" width="56" height="8" rx="2" fill="#5a0000" stroke="#c8a020" stroke-width="1.5"/>
</svg>
